name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump cache-buster version for this build
        run: |
          sed -i "s/window\.wwg_cacheVersion = [0-9]\+;/window.wwg_cacheVersion = ${{ github.run_number }};/" src/_front/router.js
          sed -i "s/const version = [0-9]\+;/const version = ${{ github.run_number }};/" public/serviceworker.js
          sed -i "s/\"cacheVersion\":\"[0-9]\+\"/\"cacheVersion\":\"${{ github.run_number }}\"/" public/data/*.json

      - name: Build
        run: npm run build

      - name: Deploy to server
        uses: easingthemes/ssh-deploy@v6
        with:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.DEPLOY_HOST }}
          REMOTE_USER: ${{ secrets.DEPLOY_USER }}
          REMOTE_PORT: ${{ secrets.DEPLOY_PORT }}
          SOURCE: "dist/"
          TARGET: "/home/arseny/www/"
          ARGS: "-rlgoDzvc -i --delete"
